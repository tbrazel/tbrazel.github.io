<div class="cgraph" data-title="{{ include.title | default: 'Circular Graph (27 nodes)' }}"></div>

<script>
(function () {
  {% assign __matrix_obj = include.matrix | default: page.matrix %}
  {% if __matrix_obj %}
  var matrix = {{ __matrix_obj | jsonify }};
  {% else %}
  console.error('schlafli_graph include: No matrix passed. Provide include.matrix or page.matrix.');
  var matrix = [];
  {% endif %}

  {% assign __groups_obj = include.groups | default: page.groups %}
  {% if __groups_obj %}
  var groups = {{ __groups_obj | jsonify }};
  {% else %}
  var groups = [
    {"count":12,"color":"#1e90ff"},
    {"count":12,"color":"#16a34a"},
    {"count":3,"color":"#ef4444"}
  ];
  {% endif %}

  var options = {
    edgeOpacity: 0.35,
    edgeWidth: 1,
    nodeRadius: 10,
    labelOffset: 18,
    fontSize: 12
  };

  function renderCircularGraph(containerEl, adj, groups, opts) {
    var container = containerEl || (document.currentScript && document.currentScript.previousElementSibling);
    if (!container) return;

    var n = (adj && adj.length) || 0;
    var i, j;

    if (n !== 27) {
      container.textContent = 'Expected a 27×27 adjacency matrix.';
      return;
    }
    for (i = 0; i < n; i++) {
      if (!Array.isArray(adj[i]) || adj[i].length !== 27) {
        container.textContent = 'Expected a 27×27 adjacency matrix.';
        return;
      }
    }

    var colors = [];
    var idx = 0;
    for (i = 0; i < groups.length; i++) {
      var g = groups[i];
      var count = g.count || 0;
      for (j = 0; j < count && idx < n; j++, idx++) {
        colors.push(g.color || '#999');
      }
    }
    while (colors.length < n) colors.push('#999');

    var W = 800, H = 800, R = 300, cx = W / 2, cy = H / 2;
    var svgNS = 'http://www.w3.org/2000/svg';
    container.innerHTML = '';

    var svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '100%');
    svg.style.display = 'block';
    svg.style.maxWidth = '900px';
    svg.style.margin = '1rem auto';

    var defs = document.createElementNS(svgNS, 'defs');
    svg.appendChild(defs);

    var title = document.createElementNS(svgNS, 'text');
    title.setAttribute('x', String(cx));
    title.setAttribute('y', '32');
    title.setAttribute('text-anchor', 'middle');
    title.setAttribute('font-size', '16');
    title.setAttribute('font-weight', '600');
    title.textContent = container.getAttribute('data-title') || 'Circular Graph';
    svg.appendChild(title);

    var angles = [];
    var pos = [];
    for (i = 0; i < n; i++) {
      var a = 2 * Math.PI * i / n - Math.PI / 2;
      angles.push(a);
      pos.push([cx + R * Math.cos(a), cy + R * Math.sin(a)]);
    }

    var edgesG = document.createElementNS(svgNS, 'g');
    var nodesG = document.createElementNS(svgNS, 'g');
    var labelsG = document.createElementNS(svgNS, 'g');

    edgesG.setAttribute('stroke', '#444');
    edgesG.setAttribute('stroke-opacity', String(opts.edgeOpacity != null ? opts.edgeOpacity : 0.35));
    edgesG.setAttribute('stroke-width', String(opts.edgeWidth != null ? opts.edgeWidth : 1));
    edgesG.setAttribute('fill', 'none');

    for (i = 0; i < n; i++) {
      for (j = i + 1; j < n; j++) {
        if (adj[i][j]) {
          var x1 = pos[i][0], y1 = pos[i][1];
          var x2 = pos[j][0], y2 = pos[j][1];
          var colorA = colors[i];
          var colorB = colors[j];

          var line = document.createElementNS(svgNS, 'line');
          line.setAttribute('x1', x1);
          line.setAttribute('y1', y1);
          line.setAttribute('x2', x2);
          line.setAttribute('y2', y2);
          line.setAttribute('data-i', String(i));
          line.setAttribute('data-j', String(j));
          line.setAttribute('stroke-opacity', String(opts.edgeOpacity != null ? opts.edgeOpacity : 0.35));
          line.setAttribute('stroke-width', String(opts.edgeWidth != null ? opts.edgeWidth : 1));

          if (colorA && colorB && colorA !== colorB) {
            var gid = 'edge-grad-' + i + '-' + j;
            var grad = document.createElementNS(svgNS, 'linearGradient');
            grad.setAttribute('id', gid);
            grad.setAttribute('gradientUnits', 'userSpaceOnUse');
            grad.setAttribute('x1', x1);
            grad.setAttribute('y1', y1);
            grad.setAttribute('x2', x2);
            grad.setAttribute('y2', y2);

            var stop1 = document.createElementNS(svgNS, 'stop');
            stop1.setAttribute('offset', '0%');
            stop1.setAttribute('stop-color', colorA);

            var stop2 = document.createElementNS(svgNS, 'stop');
            stop2.setAttribute('offset', '100%');
            stop2.setAttribute('stop-color', colorB);

            grad.appendChild(stop1);
            grad.appendChild(stop2);
            defs.appendChild(grad);

            line.setAttribute('stroke', 'url(#' + gid + ')');
          } else {
            line.setAttribute('stroke', colorA || colorB || '#444');
          }

          edgesG.appendChild(line);
        }
      }
    }

    for (i = 0; i < n; i++) {
      var x = pos[i][0], y = pos[i][1];
      var c = document.createElementNS(svgNS, 'circle');
      c.setAttribute('cx', x);
      c.setAttribute('cy', y);
      c.setAttribute('r', String(opts.nodeRadius != null ? opts.nodeRadius : 10));
      c.setAttribute('fill', colors[i]);
      c.setAttribute('stroke', '#111');
      c.setAttribute('stroke-width', '1');
      c.setAttribute('data-node', String(i + 1));
      nodesG.appendChild(c);
    }

    for (i = 0; i < n; i++) {
      var ang = angles[i];
      var px = pos[i][0], py = pos[i][1];
      var L = opts.labelOffset != null ? opts.labelOffset : 18;
      var lx = px + L * Math.cos(ang);
      var ly = py + L * Math.sin(ang);

      var t = document.createElementNS(svgNS, 'text');
      t.setAttribute('x', lx);
      t.setAttribute('y', ly);
      t.setAttribute('font-size', String(opts.fontSize != null ? opts.fontSize : 12));

      var ca = Math.cos(ang);
      var sa = Math.sin(ang);
      t.setAttribute('text-anchor', ca > 0.05 ? 'start' : (ca < -0.05 ? 'end' : 'middle'));
      t.setAttribute('dominant-baseline', sa > 0.05 ? 'hanging' : (sa < -0.05 ? 'ideographic' : 'middle'));

      t.textContent = String(i + 1);
      t.setAttribute('data-node', String(i + 1));
      labelsG.appendChild(t);
    }

    svg.appendChild(edgesG);
    svg.appendChild(nodesG);
    svg.appendChild(labelsG);
    container.appendChild(svg);

    nodesG.addEventListener('mouseover', function (e) {
      if (!e.target || e.target.tagName !== 'circle') return;

      var node = parseInt(e.target.getAttribute('data-node'), 10) - 1;
      var lines = edgesG.querySelectorAll('line');
      var circles = nodesG.querySelectorAll('circle');
      var texts = labelsG.querySelectorAll('text');
      var k, l, ii, jj;

      for (k = 0; k < lines.length; k++) {
        l = lines[k];
        ii = parseInt(l.getAttribute('data-i'), 10);
        jj = parseInt(l.getAttribute('data-j'), 10);
        if (ii === node || jj === node) {
          l.classList.remove('edge-dim');
        } else {
          l.classList.add('edge-dim');
        }
      }

      for (k = 0; k < circles.length; k++) circles[k].setAttribute('opacity', '0.35');
      for (k = 0; k < texts.length; k++) texts[k].setAttribute('opacity', '0.35');

      var hoveredLabel = labelsG.querySelector('text[data-node="' + (node + 1) + '"]');
      if (hoveredLabel) hoveredLabel.removeAttribute('opacity');
      e.target.setAttribute('opacity', '1');
    });

    nodesG.addEventListener('mouseout', function () {
      var lines = edgesG.querySelectorAll('line');
      var circles = nodesG.querySelectorAll('circle');
      var texts = labelsG.querySelectorAll('text');
      var k;

      for (k = 0; k < lines.length; k++) lines[k].classList.remove('edge-dim');
      for (k = 0; k < circles.length; k++) circles[k].removeAttribute('opacity');
      for (k = 0; k < texts.length; k++) texts[k].removeAttribute('opacity');
    });
  }

  renderCircularGraph(
    document.currentScript && document.currentScript.previousElementSibling,
    matrix,
    groups,
    options
  );
})();
</script>

<style>
.cgraph { width: 100%; max-width: 920px; aspect-ratio: 1 / 1; margin: 1rem auto; }
.cgraph svg line.edge-dim { stroke-opacity: 0.06 !important; }
</style>
